<!DOCTYPE html>

<html>
    <head>
        <title>Number Guessing Game</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <h1>🎲 Guess the Number</h1>
            <p>Pick a number between 1 and 1000</p>

            <div id="area">
                <label for="input">🎯 Enter your guess</label>
                <input type="number" id="input" placeholder="1 - 1000">
                <button id="submit">Guess</button>
            </div>

            <h2 id="slazing"></h2>
            
        </div>

        <script src="script.js"></script>
    </body>
</html>
