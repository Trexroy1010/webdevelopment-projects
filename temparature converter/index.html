<!DOCTYPE html>

<html>
    <head>
        <title>Temparature Converter</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <h1>🌡️ Temperature Converter</h1>

            <p id="p1">Enter a value and choose conversion</p>

            <textarea id="converter" placeholder="Enter value..."></textarea>

            <div class="buttons">
                <button id="btn1">C → K</button>
                <button id="btn2">K → C</button>
                <button id="btn3">C → F</button>
                <button id="btn4">F → C</button>
                <button id="btn5">F → K</button>
                <button id="btn6">K → F</button>
            </div>

            <p id="resulttalk"></p>
        </div>

        <script src="script.js"></script>

    </body>
</html>
