<!DOCTYPE html>
<html>
    <head>
    <meta charset="utf-8">
    <title>My Form</title>
    <!-- Here we created a basic forms that we can utilize later for other projects -->
    </head>

    <body>
        
        <form action="action.php" method = "post" enctype="multipart/form-data">
            <label for="username">Username : </label>
            <input type="text", id = "username" placeholder="Akash Datta Roni" minlength ="6" required>
            <br>
            <br>

            <label for="password">Password : </label>
            <input type="password" id = "password">
            <br>
            <br>

            <label for="email">Email : </label>
            <input type="email" id="email" placeholder="xyz@gmail.com" required>
            <br>
            <br>

            <label for="bday">Date of Birth : </label>
            <input type="date" id="bday" required>
            <br>
            <br>

            <label for="title">Title : </label>
            <input type="radio" id="Mr." value ="Mr." name ="title">
            <label for="Mr.">Mr. </label>
            <input type="radio" id="Mrs." value ="Mrs." name ="title">
            <label for="Mrs.">Mrs. </label>
            <input type="radio" id="Others" value ="Others" name ="title">
            <label for="Others">Others </label>
            <br>
            <br>

            <label for="payment">Payment Method : </label>
            <select id="payment">
                <option value="visa">Visa</option>
                <option value="mastercard">Mastercard</option>
                <option value="mobile_banking">Mobile Banking</option>
            </select>
            <br>
            <br>


            <label for="subscribe">Subscribe to Newsletter</label>
            <input type="checkbox" id ="subscribe">
            <br>
            <br>
            
            <label for="comment">Comment : </label>
            <textarea id="comment" rows ="4" columns = "20"></textarea>
            <br>
            <br>


            <label for="file">Upload Files : </label>
            <input type="file" id = "file" accept="image/png image/jpeg">
            <br>
            <br>


            <input type="reset">

            <input type="submit">
            <br>




        </form>
    </body>
</html>
